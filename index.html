<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        /* CSS will go here */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            color: #eee;
        }
        h1 {
            margin-bottom: 1rem;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 4px;
            background: #16213e;
            padding: 4px;
            border-radius: 8px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: #0f3460;
            border: none;
            border-radius: 4px;
            font-size: 3rem;
            font-weight: bold;
            color: #eee;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell:hover {
            background: #1a4a7a;
        }
        .cell.x {
            color: #e94560;
        }
        .cell.o {
            color: #0f9b0f;
        }
        .status {
            font-size: 1.25rem;
            min-height: 2rem;
        }
        .controls {
            display: flex;
            gap: 0.5rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn:hover {
            background: #c73e54;
        }
        .hidden {
            display: none !important;
        }
        #mode-selection {
            text-align: center;
        }
        .mode-btn {
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 15px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <div id="mode-selection">
        <button id="mode-ai-x" class="btn mode-btn">Play as X vs AI</button>
        <button id="mode-ai-o" class="btn mode-btn">Play as O vs AI</button>
        <button id="mode-local" class="btn mode-btn">vs Player (local)</button>
    </div>
    <div id="game-container" class="hidden">
        <div class="status" id="status">Player X's turn</div>
        <div class="board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>
        <div class="controls">
            <button class="btn" id="new-game">New Game</button>
            <button id="change-mode" class="btn">Change Mode</button>
        </div>
    </div>

    <script>
        // Constants
        const WINNING_LINES = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
            [0, 4, 8], [2, 4, 6]             // diagonals
        ];

        // Game state
        const game = {
            board: Array(9).fill(null),
            currentPlayer: 'X',
            isGameOver: false,
            winner: null
        };

        // Score state
        const STORAGE_KEY = 'ticTacToeScores';

        const scores = {
            singlePlayer: { wins: 0, losses: 0, draws: 0 },
            multiplayer: { wins: 0, losses: 0, draws: 0 }
        };

        // Load scores from localStorage
        function loadScores() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    Object.assign(scores.singlePlayer, parsed.singlePlayer);
                    Object.assign(scores.multiplayer, parsed.multiplayer);
                }
            } catch (e) {
                console.warn('Failed to load scores:', e);
            }
        }

        // Save scores to localStorage
        function saveScores() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
            } catch (e) {
                console.warn('Failed to save scores:', e);
            }
        }

        // DOM elements
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const newGameBtn = document.getElementById('new-game');
        const cells = document.querySelectorAll('.cell');

        console.log('Game state initialized', game);

        // Check for winner
        function checkWinner() {
            for (const [a, b, c] of WINNING_LINES) {
                if (game.board[a] &&
                    game.board[a] === game.board[b] &&
                    game.board[a] === game.board[c]) {
                    return game.board[a];
                }
            }
            return null;
        }

        // Check for draw
        function checkDraw() {
            return game.board.every(cell => cell !== null);
        }

        // Update the UI to reflect game state
        function updateUI() {
            cells.forEach((cell, index) => {
                const value = game.board[index];
                cell.textContent = value || '';
                cell.className = 'cell' + (value ? ` ${value.toLowerCase()}` : '');
            });

            if (game.winner) {
                statusEl.textContent = `Player ${game.winner} wins!`;
            } else if (game.isGameOver) {
                statusEl.textContent = "It's a draw!";
            } else {
                statusEl.textContent = `Player ${game.currentPlayer}'s turn`;
            }
        }

        // Handle cell click
        function handleCellClick(index) {
            // Ignore if game over or cell occupied
            if (game.isGameOver || game.board[index]) {
                return;
            }

            // Make move
            game.board[index] = game.currentPlayer;

            // Check for winner
            const winner = checkWinner();
            if (winner) {
                game.winner = winner;
                game.isGameOver = true;
            } else if (checkDraw()) {
                game.isGameOver = true;
            } else {
                // Switch player
                game.currentPlayer = game.currentPlayer === 'X' ? 'O' : 'X';
            }

            updateUI();
        }

        // Reset game state
        function resetGame() {
            game.board = Array(9).fill(null);
            game.currentPlayer = 'X';
            game.isGameOver = false;
            game.winner = null;
            updateUI();
        }

        // Event listeners
        cells.forEach((cell, index) => {
            cell.addEventListener('click', () => handleCellClick(index));
        });

        newGameBtn.addEventListener('click', resetGame);

        // Initialize
        loadScores();
        console.log('Scores loaded:', scores);
        updateUI();
    </script>
</body>
</html>
