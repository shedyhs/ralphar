<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        /* CSS will go here */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            color: #eee;
        }
        h1 {
            margin-bottom: 1rem;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 4px;
            background: #16213e;
            padding: 4px;
            border-radius: 8px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: #0f3460;
            border: none;
            border-radius: 4px;
            font-size: 3rem;
            font-weight: bold;
            color: #eee;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell:hover {
            background: #1a4a7a;
        }
        .cell.x {
            color: #e94560;
        }
        .cell.o {
            color: #0f9b0f;
        }
        /* Mark appearance animation */
        @keyframes markAppear {
            from {
                opacity: 0;
                transform: scale(0.3);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .cell.animate-in {
            animation: markAppear 0.2s ease-out forwards;
        }

        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            .cell.animate-in {
                animation: none;
            }
        }
        /* Score update animation */
        @keyframes scorePop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.4);
            }
            100% {
                transform: scale(1);
            }
        }

        .updated {
            animation: scorePop 0.3s ease-out;
        }

        @media (prefers-reduced-motion: reduce) {
            .updated {
                animation: none;
            }
        }
        /* Winning line highlight */
        @keyframes winningPulse {
            0%, 100% {
                background-color: #0f3460;
                box-shadow: none;
            }
            50% {
                background-color: #1a4a7a;
                box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            }
        }

        .cell.winning {
            animation: winningPulse 0.8s ease-in-out 3;
        }

        @media (prefers-reduced-motion: reduce) {
            .cell.winning {
                animation: none;
                background-color: #1a4a7a;
                box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            }
        }
        /* Cell clear animation for board reset */
        @keyframes cellClear {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.8);
            }
        }

        .clearing {
            animation: cellClear 0.15s ease-out forwards;
        }

        /* Mark fade out animation for disappearing marks */
        @keyframes markFadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.8); }
        }
        .fading {
            animation: markFadeOut 0.15s ease-out forwards;
            pointer-events: none;
        }

        @media (prefers-reduced-motion: reduce) {
            .fading { animation: none; opacity: 0; }
        }
        .status {
            font-size: 1.25rem;
            min-height: 2rem;
        }
        .controls {
            display: flex;
            gap: 0.5rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn:hover {
            background: #c73e54;
        }
        .hidden {
            display: none !important;
        }
        /* Panel transitions - override .hidden for panels only */
        .panel {
            position: relative;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.2s ease-out, visibility 0.2s;
        }

        .panel.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            /* Intentionally NOT display:none - allows CSS transition */
        }

        /* Prevent animation flash on initial page load */
        body:not(.transitions-enabled) .panel {
            transition: none !important;
        }

        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            .panel {
                transition: none !important;
            }
            .clearing {
                animation: none;
            }
        }
        #mode-selection {
            text-align: center;
        }
        .mode-btn {
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 15px;
            font-size: 1.1rem;
        }
        #score-display {
            margin: 0.5rem 0;
            font-size: 0.9rem;
            color: #aaa;
        }
        .score-row {
            display: flex;
            gap: 1rem;
            justify-content: center;
            padding: 0.25rem 0;
        }
        .score-label {
            color: #888;
            margin-right: 0.5rem;
        }
        /* Single player: wins=green, losses=red (validation-a fix) */
        #sp-wins {
            color: #0f9b0f;  /* green for wins */
        }
        #sp-losses {
            color: #e94560;  /* red for losses */
        }
        /* Multiplayer: match symbol colors (validation-a fix) */
        #mp-x-wins {
            color: #e94560;  /* X is red */
        }
        #mp-o-wins {
            color: #0f9b0f;  /* O is green */
        }
        #connection-panel {
            text-align: center;
            max-width: 400px;
            margin: 0 auto;
        }

        #connection-status {
            margin-bottom: 1rem;
            color: #e0e0e0;
        }

        #connection-code {
            width: 100%;
            font-family: monospace;
            font-size: 0.8rem;
            padding: 0.5rem;
            margin: 0.5rem 0;
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #0f3460;
            border-radius: 4px;
            resize: none;
        }

        .connection-controls {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 0.5rem 0;
        }

        .connection-controls button {
            flex: 1;
            max-width: 150px;
        }

        #back-to-modes {
            margin-top: 1rem;
            background: #333;
        }
    </style>
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <div id="mode-selection" class="panel">
        <button id="mode-ai-x" class="btn mode-btn">Play as X vs AI</button>
        <button id="mode-ai-o" class="btn mode-btn">Play as O vs AI</button>
        <button id="mode-local" class="btn mode-btn">vs Player (local)</button>
        <button id="mode-webrtc" class="btn mode-btn">Play Online</button>
    </div>
    <div id="connection-panel" class="panel hidden">
        <p id="connection-status">Create a game or paste a code to join</p>
        <div class="connection-controls">
            <button id="create-game">Create Game</button>
            <button id="copy-code" class="hidden">Copy Code</button>
        </div>
        <textarea id="connection-code" placeholder="Paste opponent's code here..." rows="3"></textarea>
        <div class="connection-controls">
            <button id="join-game">Join Game</button>
            <button id="submit-answer" class="hidden">Submit Answer</button>
        </div>
        <button id="back-to-modes">Back</button>
    </div>
    <div id="game-container" class="panel hidden">
        <div class="status" id="status">Player X's turn</div>

        <div id="score-display">
            <div id="sp-scores" class="score-row hidden">
                <span class="score-label">vs AI:</span>
                <span>W: <span id="sp-wins">0</span></span>
                <span>L: <span id="sp-losses">0</span></span>
                <span>D: <span id="sp-draws">0</span></span>
            </div>
            <div id="mp-scores" class="score-row hidden">
                <span class="score-label">Local:</span>
                <span>X: <span id="mp-x-wins">0</span></span>
                <span>O: <span id="mp-o-wins">0</span></span>
                <span>D: <span id="mp-draws">0</span></span>
            </div>
        </div>

        <div class="board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>
        <div class="controls">
            <button class="btn" id="new-game">New Game</button>
            <button id="change-mode" class="btn">Change Mode</button>
            <button id="reset-scores" class="btn">Reset Scores</button>
        </div>
    </div>

    <script>
        // WebRTC Browser Detection
        function checkWebRTCSupport() {
            try {
                const RTC = window.RTCPeerConnection || window.webkitRTCPeerConnection;
                return RTC !== undefined;
            } catch (e) {
                return false;
            }
        }

        // Constants
        const WINNING_LINES = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
            [0, 4, 8], [2, 4, 6]             // diagonals
        ];

        // Game state
        const game = {
            board: Array(9).fill(null),
            currentPlayer: 'X',
            isGameOver: false,
            winner: null,
            mode: null,
            playerSymbol: null,
            aiSymbol: null
        };

        // Score state
        const STORAGE_KEY = 'ticTacToeScores';

        const scores = {
            singlePlayer: { wins: 0, losses: 0, draws: 0 },
            multiplayer: { xWins: 0, oWins: 0, draws: 0 }
        };

        // WebRTC state
        let peerConnection = null;
        let dataChannel = null;
        let isHost = false;

        // Reset state
        let isResetting = false;
        let moveHistory = [];  // Array of cell indices in placement order

        // Load scores from localStorage
        function loadScores() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.singlePlayer) {
                        Object.assign(scores.singlePlayer, parsed.singlePlayer);
                    }
                    if (parsed.multiplayer) {
                        // Handle migration from old structure
                        if ('xWins' in parsed.multiplayer) {
                            Object.assign(scores.multiplayer, parsed.multiplayer);
                        }
                        // Old structure had wins/losses/draws - reset to new format
                    }
                }
            } catch (e) {
                console.error('Failed to load scores:', e);
            }
        }

        // Save scores to localStorage
        function saveScores() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
            } catch (e) {
                console.warn('Failed to save scores:', e);
            }
        }

        // Update score display in UI
        function updateScoreDisplay() {
            // Update single player scores
            document.getElementById('sp-wins').textContent = scores.singlePlayer.wins;
            document.getElementById('sp-losses').textContent = scores.singlePlayer.losses;
            document.getElementById('sp-draws').textContent = scores.singlePlayer.draws;

            // Update multiplayer scores
            document.getElementById('mp-x-wins').textContent = scores.multiplayer.xWins;
            document.getElementById('mp-o-wins').textContent = scores.multiplayer.oWins;
            document.getElementById('mp-draws').textContent = scores.multiplayer.draws;

            // Show correct score row based on mode
            const spScores = document.getElementById('sp-scores');
            const mpScores = document.getElementById('mp-scores');

            if (game.mode === 'ai') {
                spScores.classList.remove('hidden');
                mpScores.classList.add('hidden');
            } else {  // Handles 'local' and 'webrtc' modes
                spScores.classList.add('hidden');
                mpScores.classList.remove('hidden');
            }
        }

        // Animate score update
        function animateScoreUpdate(elementId) {
            const element = document.getElementById(elementId);
            if (!element) return;

            // Remove class first to allow re-triggering
            element.classList.remove('updated');

            // Force reflow to reset animation
            void element.offsetWidth;

            element.classList.add('updated');

            // Cleanup after animation completes
            element.addEventListener('animationend', () => {
                element.classList.remove('updated');
            }, { once: true });
        }

        // Record score when game ends
        function recordScore() {
            if (!game.isGameOver) return;

            let elementIdToAnimate = null;

            if (game.mode === 'ai') {
                if (game.winner === game.playerSymbol) {
                    scores.singlePlayer.wins++;
                    elementIdToAnimate = 'sp-wins';
                } else if (game.winner === game.aiSymbol) {
                    scores.singlePlayer.losses++;
                    elementIdToAnimate = 'sp-losses';
                } else {
                    scores.singlePlayer.draws++;
                    elementIdToAnimate = 'sp-draws';
                }
            } else {  // Handles 'local' and 'webrtc' modes
                if (game.winner === 'X') {
                    scores.multiplayer.xWins++;
                    elementIdToAnimate = 'mp-x-wins';
                } else if (game.winner === 'O') {
                    scores.multiplayer.oWins++;
                    elementIdToAnimate = 'mp-o-wins';
                } else {
                    scores.multiplayer.draws++;
                    elementIdToAnimate = 'mp-draws';
                }
            }

            saveScores();
            if (elementIdToAnimate) {
                animateScoreUpdate(elementIdToAnimate);
            }
            updateScoreDisplay();
        }

        // Reset all scores to zero
        function resetScores() {
            scores.singlePlayer = { wins: 0, losses: 0, draws: 0 };
            scores.multiplayer = { xWins: 0, oWins: 0, draws: 0 };
            saveScores();
            updateScoreDisplay();
        }

        // WebRTC connection code encoding
        function encodeConnectionCode(sdp) {
            return btoa(JSON.stringify(sdp));
        }

        // WebRTC connection code decoding with validation
        function parseConnectionCode(base64Code) {
            try {
                const json = atob(base64Code.trim());
                const parsed = JSON.parse(json);
                if (!parsed.type || !parsed.sdp) {
                    throw new Error('Missing type or sdp');
                }
                if (parsed.type !== 'offer' && parsed.type !== 'answer') {
                    throw new Error('Invalid type');
                }
                return parsed;
            } catch (e) {
                console.error('Invalid connection code:', e);
                return null;
            }
        }

        // WebRTC data channel setup with error handling
        function setupDataChannel(channel) {
            channel.onopen = () => {
                const statusEl = document.getElementById('connection-status');
                statusEl.textContent = `Connected! You are Player ${game.playerSymbol}`;
                document.getElementById('connection-panel').classList.add('hidden');
                document.getElementById('game-container').classList.remove('hidden');
                game.mode = 'webrtc';
                _resetGameState(false);  // Immediate reset for initialization
                updateScoreDisplay();
            };

            channel.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'move') {
                        handleRemoteMove(data.index);
                    } else if (data.type === 'reset') {
                        handleRemoteReset();
                    }
                } catch (e) {
                    console.error('Invalid message received:', e);
                }
            };

            channel.onclose = () => {
                handlePeerDisconnect();
            };

            channel.onerror = (error) => {
                console.error('Data channel error:', error);
                handlePeerDisconnect();
            };
        }

        // Create game as host (with CRITICAL FIX: show submitBtn)
        async function createGame() {
            const statusEl = document.getElementById('connection-status');
            const codeArea = document.getElementById('connection-code');
            const copyBtn = document.getElementById('copy-code');
            const submitBtn = document.getElementById('submit-answer');  // ADD THIS
            const createBtn = document.getElementById('create-game');
            const joinBtn = document.getElementById('join-game');

            statusEl.textContent = 'Creating game...';
            createBtn.classList.add('hidden');
            joinBtn.classList.add('hidden');

            isHost = true;
            game.playerSymbol = 'X';

            try {
                const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
                peerConnection = new RTCPeerConnection(config);

                peerConnection.onconnectionstatechange = () => {
                    if (peerConnection.connectionState === 'disconnected' ||
                        peerConnection.connectionState === 'failed') {
                        handlePeerDisconnect();
                    }
                };

                dataChannel = peerConnection.createDataChannel('game');
                setupDataChannel(dataChannel);

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate === null) {
                        const offer = peerConnection.localDescription;
                        codeArea.value = encodeConnectionCode(offer);
                        copyBtn.classList.remove('hidden');
                        submitBtn.classList.remove('hidden');  // CRITICAL FIX: Show submit button for host
                        statusEl.textContent = 'Share code with opponent, then paste their answer and click Submit';
                    }
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
            } catch (e) {
                console.error('Failed to create game:', e);
                statusEl.textContent = 'Failed to create game - please try again';
                cleanupWebRTC();
                createBtn.classList.remove('hidden');
                joinBtn.classList.remove('hidden');
            }
        }

        // Join game as guest with validation
        async function joinGame() {
            const statusEl = document.getElementById('connection-status');
            const codeArea = document.getElementById('connection-code');
            const copyBtn = document.getElementById('copy-code');
            const createBtn = document.getElementById('create-game');
            const joinBtn = document.getElementById('join-game');
            const submitBtn = document.getElementById('submit-answer');

            const offer = parseConnectionCode(codeArea.value);
            if (!offer) {
                statusEl.textContent = 'Invalid code - please try again';
                return;
            }

            if (offer.type !== 'offer') {
                statusEl.textContent = 'Invalid code - expected an offer';
                return;
            }

            statusEl.textContent = 'Connecting to game...';
            createBtn.classList.add('hidden');
            joinBtn.classList.add('hidden');

            isHost = false;
            game.playerSymbol = 'O';

            try {
                const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
                peerConnection = new RTCPeerConnection(config);

                peerConnection.onconnectionstatechange = () => {
                    if (peerConnection.connectionState === 'disconnected' ||
                        peerConnection.connectionState === 'failed') {
                        handlePeerDisconnect();
                    }
                };

                peerConnection.ondatachannel = (event) => {
                    dataChannel = event.channel;
                    setupDataChannel(dataChannel);
                };

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate === null) {
                        const answer = peerConnection.localDescription;
                        codeArea.value = encodeConnectionCode(answer);
                        copyBtn.classList.remove('hidden');
                        submitBtn.classList.remove('hidden');
                        statusEl.textContent = 'Share the answer code with the host';
                    }
                };

                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
            } catch (e) {
                console.error('Failed to join game:', e);
                statusEl.textContent = 'Failed to join game - please try again';
                cleanupWebRTC();
                createBtn.classList.remove('hidden');
                joinBtn.classList.remove('hidden');
            }
        }

        // Internal reset (no message sending to prevent loop)
        function _resetGameState(animate = true) {
            if (isResetting) return;  // Guard against rapid resets
            isResetting = true;

            if (animate) {
                // Add clearing animation to all marked cells
                cells.forEach(cell => {
                    if (cell.textContent !== '') {
                        cell.classList.remove('animate-in');  // Remove mark animation
                        cell.classList.add('clearing');
                    }
                });

                // Reset game state immediately (so game is playable)
                game.board = Array(9).fill(null);
                game.currentPlayer = 'X';
                game.isGameOver = false;
                game.winner = null;
                moveHistory = [];
                isResetting = false;  // Release guard immediately after state reset

                // Delay UI update to show animation
                setTimeout(() => {
                    cells.forEach(cell => {
                        cell.classList.remove('winning', 'clearing', 'fading');
                    });
                    updateUI();
                }, 150);
            } else {
                // Immediate reset for game initialization
                game.board = Array(9).fill(null);
                game.currentPlayer = 'X';
                game.isGameOver = false;
                game.winner = null;
                moveHistory = [];
                cells.forEach(cell => {
                    cell.classList.remove('winning', 'clearing', 'fading');
                });
                updateUI();
                isResetting = false;
            }
        }

        // Handle remote player's move (CRITICAL FIX: pass getWinningLine())
        function handleRemoteMove(index) {
            if (game.isGameOver) return;
            if (game.board[index] !== null) return;
            if (game.currentPlayer === game.playerSymbol) return;

            game.board[index] = game.currentPlayer;

            // Track move and remove oldest if over 5 marks
            moveHistory.push(index);
            removeOldestMark();

            const winner = checkWinner();
            if (winner) {
                game.isGameOver = true;
                game.winner = winner;
                highlightWinningLine(getWinningLine());  // CRITICAL FIX: Must pass getWinningLine() or highlight won't work
                recordScore();
            } else if (checkDraw()) {
                game.isGameOver = true;
                recordScore();
            } else {
                game.currentPlayer = game.currentPlayer === 'X' ? 'O' : 'X';
            }
            updateUI();
        }

        // Handle remote reset (no message sending)
        function handleRemoteReset() {
            _resetGameState();
        }

        // Submit answer code to complete connection
        async function submitAnswer() {
            const statusEl = document.getElementById('connection-status');
            const codeArea = document.getElementById('connection-code');

            const answer = parseConnectionCode(codeArea.value);
            if (!answer) {
                statusEl.textContent = 'Invalid code - please try again';
                return;
            }

            if (answer.type !== 'answer') {
                statusEl.textContent = 'Invalid code - expected an answer';
                return;
            }

            statusEl.textContent = 'Connecting...';

            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            } catch (e) {
                console.error('Failed to complete connection:', e);
                statusEl.textContent = 'Connection failed - please try again';
            }
        }

        // Cleanup WebRTC resources (idempotent)
        function cleanupWebRTC() {
            if (dataChannel) {
                dataChannel.close();
                dataChannel = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            isHost = false;
        }

        // Handle peer disconnection
        function handlePeerDisconnect() {
            cleanupWebRTC();
            if (game.mode === 'webrtc') {
                const statusEl = document.getElementById('status');
                statusEl.textContent = 'Opponent disconnected';
                game.isGameOver = true;
            }
        }

        // DOM elements
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const newGameBtn = document.getElementById('new-game');
        const cells = document.querySelectorAll('.cell');
        const modeSelectionEl = document.getElementById('mode-selection');
        const gameContainerEl = document.getElementById('game-container');
        const changeModeBtn = document.getElementById('change-mode');

        console.log('Game state initialized', game);

        // Check for winner
        function checkWinner() {
            for (const [a, b, c] of WINNING_LINES) {
                if (game.board[a] &&
                    game.board[a] === game.board[b] &&
                    game.board[a] === game.board[c]) {
                    return game.board[a];
                }
            }
            return null;
        }

        // Get winning line indices
        function getWinningLine() {
            for (const line of WINNING_LINES) {
                const [a, b, c] = line;
                if (game.board[a] &&
                    game.board[a] === game.board[b] &&
                    game.board[a] === game.board[c]) {
                    return line;
                }
            }
            return null;
        }

        // Highlight winning line cells
        function highlightWinningLine(indices) {
            if (!indices) return;
            indices.forEach(index => {
                cells[index].classList.add('winning');
            });
        }

        // Check for draw
        function checkDraw() {
            // With disappearing marks active, draws are impossible
            if (moveHistory.length >= 5) return false;
            return game.board.every(cell => cell !== null);
        }

        // Remove oldest mark when history exceeds 5 moves
        function removeOldestMark() {
            if (moveHistory.length <= 5) return;

            const oldestIndex = moveHistory.shift();
            if (game.board[oldestIndex] === null) return;  // Guard against double-removal

            const cell = cells[oldestIndex];
            cell.classList.add('fading');
            game.board[oldestIndex] = null;

            cell.addEventListener('animationend', () => {
                cell.classList.remove('fading');
                cell.textContent = '';
                cell.className = 'cell';
            }, { once: true });
        }

        // Update the UI to reflect game state
        function updateUI() {
            cells.forEach((cell, index) => {
                // Skip cells currently fading out - let animation complete
                if (cell.classList.contains('fading')) return;

                const value = game.board[index];
                cell.textContent = value || '';
                const wasEmpty = !cell.classList.contains('x') && !cell.classList.contains('o');
                const hasNewMark = value && wasEmpty;
                const isWinning = cell.classList.contains('winning');
                const isClearing = cell.classList.contains('clearing');
                cell.className = 'cell' + (value ? ` ${value.toLowerCase()}` : '') + (hasNewMark ? ' animate-in' : '') + (isWinning ? ' winning' : '') + (isClearing ? ' clearing' : '');
            });

            // WebRTC mode status messages
            if (game.mode === 'webrtc') {
                if (game.isGameOver) {
                    // Check draw FIRST (validation-b fix)
                    if (game.winner === null) {
                        statusEl.textContent = "It's a draw!";
                    } else if (game.winner === game.playerSymbol) {
                        statusEl.textContent = 'You win!';
                    } else {
                        statusEl.textContent = 'You lose!';
                    }
                } else {
                    if (game.currentPlayer === game.playerSymbol) {
                        statusEl.textContent = `Your turn (Player ${game.playerSymbol})`;
                    } else {
                        statusEl.textContent = `Waiting for opponent (Player ${game.currentPlayer})...`;
                    }
                }
            } else {
                // Local and AI modes
                if (game.winner) {
                    statusEl.textContent = `Player ${game.winner} wins!`;
                } else if (game.isGameOver) {
                    statusEl.textContent = "It's a draw!";
                } else {
                    statusEl.textContent = `Player ${game.currentPlayer}'s turn`;
                }
            }
        }

        // Handle cell click
        function handleCellClick(index) {
            // Ignore if game over or cell occupied
            if (game.isGameOver || game.board[index]) {
                return;
            }

            // Block clicks when not your turn in WebRTC mode
            if (game.mode === 'webrtc' && game.currentPlayer !== game.playerSymbol) return;

            // Make move
            game.board[index] = game.currentPlayer;

            // Track move and remove oldest if over 5 marks
            moveHistory.push(index);
            removeOldestMark();

            // Sync move to remote peer
            if (game.mode === 'webrtc' && dataChannel?.readyState === 'open') {
                dataChannel.send(JSON.stringify({ type: 'move', index: index }));
            }

            // Check for winner
            const winner = checkWinner();
            if (winner) {
                game.winner = winner;
                game.isGameOver = true;
                highlightWinningLine(getWinningLine());
                recordScore();
            } else if (checkDraw()) {
                game.isGameOver = true;
                recordScore();
            } else {
                // Switch player
                game.currentPlayer = game.currentPlayer === 'X' ? 'O' : 'X';
            }

            updateUI();

            // Trigger AI move if applicable
            if (!game.isGameOver && game.mode === 'ai' && game.currentPlayer === game.aiSymbol) {
                setTimeout(makeAIMove, 300);
            }
        }

        // Reset game state
        function resetGame() {
            // WebRTC sync happens immediately (before animation)
            if (game.mode === 'webrtc' && dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(JSON.stringify({ type: 'reset' }));
            }

            _resetGameState();

            // AI first move: 150ms animation + 300ms delay = 450ms total
            if (game.mode === 'ai' && game.aiSymbol === 'X') {
                setTimeout(makeAIMove, 450);
            }
        }

        function startLocalGame() {
            game.mode = 'local';
            game.playerSymbol = null;
            game.aiSymbol = null;
            modeSelectionEl.classList.add('hidden');
            gameContainerEl.classList.remove('hidden');
            _resetGameState(false);  // Immediate reset for initialization
            updateScoreDisplay();
        }

        function startAIGame(playerSymbol) {
            game.mode = 'ai';
            game.playerSymbol = playerSymbol;
            game.aiSymbol = playerSymbol === 'X' ? 'O' : 'X';
            modeSelectionEl.classList.add('hidden');
            gameContainerEl.classList.remove('hidden');
            _resetGameState(false);  // Immediate reset for initialization
            updateScoreDisplay();

            // Trigger AI first move if AI is X
            if (game.aiSymbol === 'X') {
                setTimeout(makeAIMove, 300);
            }
        }

        function showModeSelection() {
            // Cleanup WebRTC connection when changing mode
            if (game.mode === 'webrtc') {
                cleanupWebRTC();
            }
            _resetGameState(false);  // Immediate reset when changing modes
            game.mode = null;
            game.playerSymbol = null;
            game.aiSymbol = null;
            gameContainerEl.classList.add('hidden');
            modeSelectionEl.classList.remove('hidden');
        }

        function findWinningMove(symbol) {
            for (const [a, b, c] of WINNING_LINES) {
                const line = [game.board[a], game.board[b], game.board[c]];
                if (line.filter(x => x === symbol).length === 2 &&
                    line.filter(x => x === null).length === 1) {
                    return [a, b, c][line.indexOf(null)];
                }
            }
            return null;
        }

        function findBestMove() {
            const winMove = findWinningMove(game.aiSymbol);
            if (winMove !== null) return winMove;

            const blockMove = findWinningMove(game.playerSymbol);
            if (blockMove !== null) return blockMove;

            if (game.board[4] === null) return 4;

            const corners = [0, 2, 6, 8];
            for (const c of corners) {
                if (game.board[c] === null) return c;
            }

            return game.board.findIndex(cell => cell === null);
        }

        function makeAIMove() {
            if (game.isGameOver || game.currentPlayer !== game.aiSymbol) return;

            const move = findBestMove();
            if (move !== null && move !== -1) {
                handleCellClick(move);
            }
        }

        // Event listeners
        cells.forEach((cell, index) => {
            cell.addEventListener('click', () => {
                // Block clicks during AI's turn
                if (game.mode === 'ai' && game.currentPlayer === game.aiSymbol) return;
                handleCellClick(index);
            });
        });

        newGameBtn.addEventListener('click', resetGame);

        document.getElementById('mode-ai-x').addEventListener('click', () => startAIGame('X'));
        document.getElementById('mode-ai-o').addEventListener('click', () => startAIGame('O'));
        document.getElementById('mode-local').addEventListener('click', startLocalGame);
        changeModeBtn.addEventListener('click', showModeSelection);
        document.getElementById('reset-scores').addEventListener('click', resetScores);

        // WebRTC event listeners (with feature detection guard)
        const webrtcButton = document.getElementById('mode-webrtc');
        if (webrtcButton && checkWebRTCSupport()) {
            webrtcButton.addEventListener('click', () => {
                document.getElementById('mode-selection').classList.add('hidden');
                document.getElementById('connection-panel').classList.remove('hidden');
            });
        }

        document.getElementById('create-game').addEventListener('click', createGame);
        document.getElementById('join-game').addEventListener('click', joinGame);
        document.getElementById('submit-answer').addEventListener('click', submitAnswer);

        document.getElementById('copy-code').addEventListener('click', async () => {
            const codeArea = document.getElementById('connection-code');
            const copyBtn = document.getElementById('copy-code');
            try {
                await navigator.clipboard.writeText(codeArea.value);
                copyBtn.textContent = 'Copied!';
                setTimeout(() => { copyBtn.textContent = 'Copy Code'; }, 2000);
            } catch (e) {
                console.error('Failed to copy:', e);
                codeArea.select();
            }
        });

        document.getElementById('back-to-modes').addEventListener('click', () => {
            cleanupWebRTC();
            document.getElementById('connection-panel').classList.add('hidden');
            document.getElementById('mode-selection').classList.remove('hidden');
            document.getElementById('create-game').classList.remove('hidden');
            document.getElementById('join-game').classList.remove('hidden');
            document.getElementById('copy-code').classList.add('hidden');
            document.getElementById('submit-answer').classList.add('hidden');
            document.getElementById('connection-code').value = '';
            document.getElementById('connection-status').textContent = 'Create a game or paste a code to join';
        });

        // Initialize
        loadScores();
        updateScoreDisplay();
        console.log('Scores loaded:', scores);
        updateUI();

        // Hide WebRTC button if unsupported
        if (!checkWebRTCSupport()) {
            const btn = document.getElementById('mode-webrtc');
            if (btn) btn.classList.add('hidden');
        }

        // Enable transitions after first paint (prevents flash on page load)
        requestAnimationFrame(() => document.body.classList.add('transitions-enabled'));
    </script>
</body>
</html>
