[advisories]
version = 2
ignore = [
    # RUSTSEC-2024-0436: paste crate is unmaintained but comes from ratatui.
    # This is a transitive dependency, not a security vulnerability.
    # Will be resolved when ratatui updates or when alternatives are available.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
